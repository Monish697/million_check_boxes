<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>One_million_checkBoxes</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>1 One Million CheckBoxes</h1>
        <div id="container"></div>
        <script src="/socket.io/socket.io.js"></script>

        <script>
            const socket = io();
            let container = document.getElementById("container");

            socket.on(`server:emited:data`, (data) => {
                //id of the checkbox
                let idFromData = data.message.split(" ")[0];
                //state of the box checked or not --not AI I have wrote this
                let stateFromData = data.message.split(":")[1].trim();
                let elementToEmitDatainUI = document.getElementById(idFromData);
                elementToEmitDatainUI.checked = stateFromData;
                console.log(elementToEmitDatainUI);
            });

            window.addEventListener("load", async () => {
                let responce = await fetch("http://localhost:5000/checkBoxes", {
                    method: "GET",
                });
                const data = await responce.json();
                console.log(data);

                if (data && data.checkBoxes) {
                    data.checkBoxes.forEach((checked, index) => {
                        let checkBoxElement = document.createElement("input");
                        checkBoxElement.type = "checkbox";
                        checkBoxElement.id = `checkbox-${index}`;
                        checkBoxElement.checked = checked;
                        container.append(checkBoxElement);
                    });
                }
            });

            // for (let i = 0; i <= noOfCheckBoxes; i++) {

            // }
            container.addEventListener("click", (e) => {
                if (e.target.type === "checkbox") {
                    console.log(
                        `${e.target.id} is checked : ${e.target.checked}`,
                    );
                    socket.emit("client:checkbox:changed", {
                        message: `${e.target.id} is checked : ${e.target.checked}`,
                    });
                }
            });
        </script>
    </body>
</html>
